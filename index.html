<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soda Slider</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body >
    <header>
        <div>LUNDEV</div>
        <nav>
            <ul>
                <li>HOME</li>
                <li>CONTACT</li>
                <li>LOGIN</li>
            </ul>
        </nav>
    </header>

    <div class="carrossel">
        <div class="lista">

            <div class="item active bg-[#ea3d41]">
                <div class="conteudo">
                    morango
                </div>
                <img src="imagens/fruit_strawberry.png" class="fruta">
            </div>
            <div class="item bg-[#2d5643]">
                <div class="conteudo">
                    abacate
                </div>
                <img src="imagens/fruit_avocado.png" class="fruta">
            </div>
            <div class="item hidden bg-[#e7a043]">
                <div class="conteudo">
                    laranja
                </div>
                <img src="imagens/fruit_orange.png" class="fruta">
            </div>



        </div>
    </div>


</body>
</html>
